services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf"
    depends_on:
      - app1
      - app2
      - app3

  app1:
    build: ./server/
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "wget", "-q0-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  app2:
    build: ./server/
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "wget", "-q0-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  app3:
    build: ./server/
    environment:
      PORT: "8080"
    healthcheck:
      test: ["CMD", "wget", "-q0-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"
