services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - "./nginx.conf:/etc/nginx/nginx.conf:ro"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

  app:
    build: ./server/
    environment:
      PORT: ${PORT}
      HOST: ${HOST}
      HOSTNAME: ${HOSTNAME}
      DATABASE_URL: ${AWS_PSQL_URL}
      AWS_PSQL_URL: ${AWS_PSQL_URL}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      replicas: 3
    networks:
      - internal

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
    depends_on:
      - prometheus
    volumes:
      - "./data/grafana:/var/lib/grafana"
    networks:
      - internal

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./data/prometheus:/prometheus"
    networks:
      - internal

networks:
  internal:
    driver: bridge